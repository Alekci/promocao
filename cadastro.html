<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Bizarre Vibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cadastro-body">
    <header>
        <div class="header-container">
            <div class="logo">Bizarre<span>Vibe</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="index.html#informacoes">Informações</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="form-wrapper">
        <div class="form-container">
            <h2>Crie sua conta</h2>
            <p>Prepare-se para o despertar do seu estilo.</p>
            
            <form action="#">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required>
                </div>

                <div class="input-group">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha"  required>
                </div>

                <button type="submit" class="btn">Finalizar Cadastro</button>
            </form>
            
            <p class="login-link">Já tem uma conta? <a href="#">Faça login</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Bizarre Vibe. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
