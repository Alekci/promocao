<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de código</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="header-container">
            <div class="logo">Bizarre<span>Vibe</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="index.html#informacoes">Informações</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="#sobre">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="cadastro" class="products">
        <h2 class="section-title">
            <p>Resgate seu prêmio!</p>
        </h2>
        <form method="post">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Seu nome aqui" required>

            <label for="email">E-Mail</label>
            <input type="email" id="email" placeholder="Seu E-Mail" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite uma senha" required>

            <div>
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>
            <div>
                <label>CEP</label>
                <input type="text" id="cep" placeholder="89100-000" required>
            </div>

            <div>
                <label>Cidade</label>
                <input type="text" id="cidade" required>
            </div>
            <div>
                <label>Estado</label>
                <input type="text" id="estado" required>
            </div>

            <div class="promo-container">
                <label for="promo">Digite seu código promocional</label>
                <input type="text" id="promo" placeholder="EX:13042009<3" required>
            </div>

            <div class="btn-group">
               <button type="submit" class="btn-cadstrar" id="botao">Cadastrar</button>
                <a href="index.html" class="btn-voltar">← Voltar para a página inicial</a>
            </div>
        </form>

    </section>

    <footer id="sobre">
        Feito por Alex
        <p>&copy; 2026 Bizarre Vibe. Todos os direitos reservados.</p>
        <a href="https://instagram.com/bizarrevibe">Instagram</a>
        <p>
            <a href="https://tiktok.com/@bizarrevibe">TikTok</a>
        </p>
    </footer>

    <script src="js/javascript.js"></script>
</body>

</html>
